name: Deploy to Aliyun

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          HOST: 47.114.120.73
          USERNAME: admin
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SOURCE: "进度管理系统.html"
          TARGET: "/var/www/store-progress-manager/"
          strip_components: 0

      - name: Set file permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          HOST: 47.114.120.73
          USERNAME: admin
          KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod 644 /var/www/store-progress-manager/进度管理系统.html
            echo "Deploy completed at $(date)"
